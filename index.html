<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abstract Raven</title>

  <!-- CSS: la apariencia -->
  <style>
    :root {
      --bg: #0d0d10;
      --text: #e8e8ea;
      --muted: #9a9aa3;
      --accent: #7c5cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      line-height: 1.6;
    }
    h1 { font-size: 2.5rem; letter-spacing: -0.02em; }
    p.tagline { color: var(--muted); margin-top: 12px; font-size: 1.1rem; }
    nav { margin-top: 28px; display: flex; gap: 20px; }
    nav a { color: var(--accent); text-decoration: none; font-weight: 500; }
    nav a:hover { text-decoration: underline; }
    footer { color: var(--muted); font-size: 0.85rem; margin-top: 48px; }
  </style>
</head>
<body>

  <!-- HTML: el contenido -->
  <main>
    <h1>Abstract Raven</h1>
    <p class="tagline">Developer · juegos, bases de datos y cosas que aprendo por el camino.</p>
    <nav>
      <a href="https://github.com/absravdev">GitHub</a>
      <a href="mailto:hola@abstractraven.com">Email</a>
    </nav>
  </main>

  <footer>
    © <span id="year"></span> Abstract Raven
  </footer>

  <!-- JS: el comportamiento -->
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

</body>
</html>
